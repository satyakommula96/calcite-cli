name: Build and Release

on:
  push:
    branches: [ "main" ]
    tags:
      - 'v*'
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.24.0'
          cache: true

      - name: Test with coverage
        run: |
          go test -v -race -coverprofile=coverage.txt -covermode=atomic ./...
          go tool cover -func=coverage.txt

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.txt
          flags: unittests
          fail_ci_if_error: false # Allow tests passing even if codecov upload drops

      # Standard check build for regular PRs and pushes without tags
      - name: Build (Basic Validation)
        if: "!startsWith(github.ref, 'refs/tags/')"
        run: go build -v -o calcite-cli

      # Cross-compile fully optimized payloads whenever a tag is pushed
      - name: Cross-compile for Release
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          mkdir -p dist
          # Build with ldflags -s -w to strip debug symbols and drastically reduce binary size
          GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o dist/calcite-cli-linux-amd64
          GOOS=windows GOARCH=amd64 go build -ldflags="-s -w" -o dist/calcite-cli-windows-amd64.exe
          GOOS=darwin GOARCH=amd64 go build -ldflags="-s -w" -o dist/calcite-cli-darwin-amd64
          GOOS=darwin GOARCH=arm64 go build -ldflags="-s -w" -o dist/calcite-cli-darwin-arm64

      - name: Upload Release Artifacts
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: calcite-cli-binaries
          path: dist/*
          retention-days: 1

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: calcite-cli-binaries
          path: dist

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
